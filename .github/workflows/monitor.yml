name: BMS Show Monitor

on:
  schedule:
    - cron: '0 * * * *'    # every hour (keeps within ScraperAPI free tier)
  workflow_dispatch:         # allows manual trigger from the Actions tab

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install curl_cffi

      - name: Check BMS and notify
        run: python notify.py
        env:
          GREEN_API_INSTANCE: ${{ secrets.GREEN_API_INSTANCE }}
          GREEN_API_TOKEN: ${{ secrets.GREEN_API_TOKEN }}
          GREEN_API_CHAT_ID: ${{ secrets.GREEN_API_CHAT_ID }}
          GREEN_API_URL: ${{ secrets.GREEN_API_URL }}
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
